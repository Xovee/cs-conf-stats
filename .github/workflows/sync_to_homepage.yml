name: Sync to xoveexu-com csconfstats branch

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cs-conf-stats
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build generated assets
        run: npm run build

      - name: Check source, data, and generated SEO pages
        run: npm run check

      - name: Verify generated assets are current
        run: |
          git diff --exit-code -- output.css conferences sitemap.xml sitemap.txt robots.txt

      - name: Checkout xoveexu-com@csconfstats
        uses: actions/checkout@v4
        with:
          repository: Xovee/xoveexu-com
          ref: csconfstats
          token: ${{ secrets.GH_PAT }}
          path: xoveexu-com

      - name: Sync files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='xoveexu-com/**' \
            ./ xoveexu-com/

      - name: Commit & push
        working-directory: xoveexu-com
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "Sync from cs-conf-stats @${{ github.sha }}"
          git push origin csconfstats
